<head>

    <style>
        .shop-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 32px 80px;
            align-items: flex-end;
            justify-content: center;
        }
        @media (max-width: 500px) { .shop-grid { gap: 24px; padding: 0 16px 60px; } }

        .shop-card {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-shrink: 0;
        }
        @media (max-width: 600px) { .shop-card { width: 100% !important; } }

        .shop-card-img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            display: block;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .shop-card:hover .shop-card-img {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(58,43,26,0.1);
        }
        .shop-card-caption {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.82em;
            font-weight: 400;
        }
        .shop-card-title { color: #555; margin: 0; }
        .shop-card-price { color: #555; margin: 0; flex-shrink: 0; }

        /* Modal — full-screen lightbox */
        .shop-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 3000;
            background: rgba(0,0,0,0.88);
            align-items: center;
            justify-content: center;
            padding: 24px 32px;
        }
        .shop-modal-overlay.open { display: flex; }

        .shop-modal-close {
            position: fixed;
            top: 20px;
            right: 24px;
            background: none;
            border: none;
            font-size: 32px;
            line-height: 1;
            cursor: pointer;
            color: rgba(255,255,255,0.7);
            padding: 4px;
            transition: color 0.15s;
            z-index: 3001;
        }
        .shop-modal-close:hover { color: #fff; }

        .shop-modal {
            display: flex;
            gap: 12px;
            max-width: 820px;
            width: 100%;
            align-items: center;
        }
        @media (max-width: 700px) {
            .shop-modal { flex-direction: column; gap: 20px; }
        }

        .shop-modal-images {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .shop-modal-img-wrap {
            position: relative;
            height: 68vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @media (max-width: 700px) { .shop-modal-img-wrap { height: 45vh; } }

        .shop-modal-main-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
            display: block;
        }

        .shop-modal-thumbnails {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            flex-shrink: 0;
        }
        .shop-modal-thumb {
            width: 52px;
            height: 52px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.15s;
            opacity: 0.7;
        }
        .shop-modal-thumb:hover { opacity: 1; }
        .shop-modal-thumb.active { border-color: #D7BAAD; opacity: 1; }

        .shop-modal-info {
            width: 260px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        @media (max-width: 700px) { .shop-modal-info { width: 100%; } }

        .shop-modal-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.4em;
            color: #fff;
            margin: 0 0 4px;
        }
        .shop-modal-meta {
            font-family: 'Inter', sans-serif;
            font-size: 0.88em;
            color: rgba(255,255,255,0.55);
            line-height: 1.8;
            margin: 0;
        }
        .shop-modal-price {
            font-family: 'Inter', sans-serif;
            font-size: 1.4em;
            font-weight: 700;
            color: #fff;
            margin: 8px 0 16px;
        }
        .shop-modal-desc {
            font-family: 'Inter', sans-serif;
            font-size: 0.88em;
            color: rgba(255,255,255,0.75);
            line-height: 1.75;
            margin: 4px 0 8px;
        }
        .shop-modal-contact {
            font-family: 'Inter', sans-serif;
            font-size: 0.88em;
            color: rgba(255,255,255,0.55);
            line-height: 1.7;
        }
        .shop-modal-contact a {
            color: rgba(255,255,255,0.85);
            text-decoration: underline;
        }
        .shop-modal-contact a:hover { color: #fff; }

    </style>
</head>
<body style="background:#F7F7F7;">

            <div class="shop-modal-images">

                    To purchase, contact via

    </div>

    <script src="scripts/main.js"></script>
    <script src="scripts/loading.js"></script>
    <script>
    (function () {
        let items = [];
        let currentItem = null;
        let currentImgIdx = 0;

        function openModal(item) {
            currentItem = item;
            currentImgIdx = 0;
            updateModalImage();

            document.getElementById('shop-modal-title').textContent = item.title;
            document.getElementById('shop-modal-meta').textContent =
                [item.year, item.dimensions, item.medium].filter(Boolean).map(s => s.toLowerCase()).join(' · ');
            const descEl = document.getElementById('shop-modal-desc');
            descEl.textContent = item.description || '';
            descEl.style.display = item.description ? '' : 'none';
            document.getElementById('shop-modal-price').textContent = item.price;

            const thumbsEl = document.getElementById('shop-modal-thumbnails');
            thumbsEl.innerHTML = '';

            if (item.images.length > 1) {
                item.images.forEach((src, i) => {
                    const img = document.createElement('img');
                    img.src = src;
                    img.className = 'shop-modal-thumb' + (i === 0 ? ' active' : '');
                    img.addEventListener('click', () => { currentImgIdx = i; updateModalImage(); });
                    thumbsEl.appendChild(img);
                });
            }

            document.getElementById('shop-modal-overlay').classList.add('open');
        }

        function updateModalImage() {
            const src = currentItem.images[currentImgIdx];
            document.getElementById('shop-modal-main-img').src = src;
            document.querySelectorAll('.shop-modal-thumb').forEach((el, i) => {
                el.classList.toggle('active', i === currentImgIdx);
            });
        }

        function closeModal() {
            document.getElementById('shop-modal-overlay').classList.remove('open');
        }

        document.getElementById('shop-modal-close').addEventListener('click', closeModal);
        document.getElementById('shop-modal-overlay').addEventListener('click', closeModal);
        document.getElementById('shop-modal').addEventListener('click', function (e) {
            e.stopPropagation();
        });
        document.addEventListener('keydown', function (e) {
            if (!document.getElementById('shop-modal-overlay').classList.contains('open')) return;
            if (e.key === 'Escape') closeModal();
            if (e.key === 'ArrowLeft') {
                currentImgIdx = (currentImgIdx - 1 + currentItem.images.length) % currentItem.images.length;
                updateModalImage();
            }
            if (e.key === 'ArrowRight') {
                currentImgIdx = (currentImgIdx + 1) % currentItem.images.length;
                updateModalImage();
            }
        });

        function parseDims(str) {
            const m = str && str.match(/(\d+)[×x](\d+)/);
            return m ? { w: +m[1], h: +m[2] } : null;
        }

        async function loadShop() {
            const r = await fetch('assets/shop.json');
            items = await r.json();

            const maxW = Math.max(...items.map(it => parseDims(it.dimensions)?.w || 0));
            const BASE_PX = 280; // largest painting width in pixels

            const grid = document.getElementById('shop-grid');
            grid.innerHTML = items.map((item, i) => {
                const dims = parseDims(item.dimensions);
                const pxW = dims ? Math.round((dims.w / maxW) * BASE_PX) : BASE_PX;
                return `<div class="shop-card" data-idx="${i}" style="width:${pxW}px">
                    <img class="shop-card-img" src="${item.images[0]}" alt="${item.title}" loading="lazy" decoding="async" />
                    <div class="shop-card-caption">
                        <span class="shop-card-title">${item.title}</span>
                        <span class="shop-card-price">${item.price}</span>
                    </div>
                </div>`;
            }).join('');
            grid.querySelectorAll('.shop-card').forEach(card => {
                card.addEventListener('click', () => openModal(items[+card.dataset.idx]));
            });
        }

        loadShop().catch(console.error);
    })();
    </script>
