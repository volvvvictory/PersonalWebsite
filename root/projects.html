    <script>
    (function () {
        function webpBase(src) {
            // Convert assets/Gallery/file.ext → assets/Gallery/webp/file
            return src.replace(/^(assets\/Gallery\/)([^/]+)\.[^.]+$/, '$1webp/$2');
        }

        function buildPicture(src, alt, sizesVw) {
            const isGallery = /^assets\/Gallery\/[^/]+\.[^.]+$/.test(src);
            const pic = document.createElement('picture');
            if (isGallery) {
                const base = webpBase(src);
                const source = document.createElement('source');
                source.type = 'image/webp';
                source.srcset = base + '-800w.webp 800w, ' + base + '.webp 1200w';
                source.sizes = sizesVw + 'vw';
                pic.appendChild(source);
            }
            const img = document.createElement('img');
            img.src = src;
            img.alt = alt;
            img.loading = 'lazy';
            img.decoding = 'async';
            pic.appendChild(img);
            return pic;
        }

        function buildEntry(proj) {
            const entry = document.createElement('div');
            entry.className = 'project-entry';

            // Image strip
            const imgDiv = document.createElement('div');
            imgDiv.className = 'project-images';
            const sizesVw = Math.floor(80 / proj.images.length);
            proj.images.forEach(function (src) {
                imgDiv.appendChild(buildPicture(src, proj.name, sizesVw));
            });

            // Meta row
            const metaDiv = document.createElement('div');
            metaDiv.className = 'project-meta';

            const nameDiv = document.createElement('div');
            nameDiv.className = 'project-name';
            nameDiv.textContent = proj.name;

            const whatDiv = document.createElement('div');
            whatDiv.className = 'project-what';
            var whatHTML = proj.type || '';
            if (proj.tools) whatHTML += '<br>' + proj.tools;
            whatHTML += '<em>' + proj.year + '</em>';
            whatHTML += proj.team.map(function (t) {
                return t.includes(':')
                    ? '<span style="color:#aaa;">' + t + '</span>'
                    : t;
            }).join('<br>');
            whatDiv.innerHTML = whatHTML;

            const descDiv = document.createElement('div');
            descDiv.className = 'project-desc';
            descDiv.innerHTML = (proj.description || []).map(function (p) {
                return '<p>' + p + '</p>';
            }).join('');

            metaDiv.appendChild(nameDiv);
            metaDiv.appendChild(whatDiv);
            metaDiv.appendChild(descDiv);

            entry.appendChild(imgDiv);
            entry.appendChild(metaDiv);
            return entry;
        }

        fetch('assets/projects.json')
            .then(function (r) { return r.json(); })
            .then(function (projects) {
                var list = document.getElementById('projects-list');
                projects.forEach(function (proj) {
                    list.appendChild(buildEntry(proj));
                });
            })
            .catch(function (err) { console.error('projects.json load error', err); });
    })();
    </script>
